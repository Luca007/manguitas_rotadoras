<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cia Manguitas Rotadoras - Links</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header Section -->
        <header class="header">
            <div class="image-container">
                <img src="images/manguitas_rotadoras.jpg" alt="Cia Manguitas Rotadoras" class="header-img">
                <div class="fade-overlay"></div>
            </div>
            <div class="profile-info">
                <h1 class="title">Cia Manguitas Rotadoras</h1>
                <p class="subtitle">Cia Circense ✣ Acrobacias Aéreas</p>
                <div class="social-icons">
                    <a href="mailto:manguitasrotadoras@gmail.com" class="icon-link" aria-label="Email">
                        <i class="fas fa-envelope"></i>
                    </a>
                    <a href="https://wa.me/5561998443023" class="icon-link" aria-label="WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                </div>
            </div>
        </header>

        <!-- Links Section -->
        <main class="links-container">
            <!-- Simple Link -->
            <a href="https://drive.google.com/file/d/1zJ96Kiq-HKD9gDaeV4OLhdA8eXEsHEJE/view?usp=drivesdk" class="btn btn-primary" target="_blank" rel="noopener noreferrer">Patifório Artístico</a>

            <!-- Accordion Links -->
            <div class="accordion">
                <button class="btn btn-primary accordion-header">
                    <span>Giu Clerot</span>
                    <i class="fas fa-chevron-down chevron"></i>
                </button>
                <div class="accordion-content">
                    <div class="content-inner">
                        <img src="images/giu_clerot.JPG" alt="Giu Clerot" class="avatar-small">
                        <p>Acrobata aérea especializada em tecido e trapézio.</p>
                        <div class="sub-links">
                            <a href="https://www.instagram.com/giu.c_a?igsh=dXdkMXo3NDRnMXB3&utm_source=qr" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i> Instagram</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <button class="btn btn-primary accordion-header">
                    <span>Dani Oliveira</span>
                    <i class="fas fa-chevron-down chevron"></i>
                </button>
                <div class="accordion-content">
                    <div class="content-inner">
                        <img src="images/dani.JPG" alt="Dani Oliveira" class="avatar-small">
                        <p>Performer e instrutora de artes circenses.</p>
                        <div class="sub-links">
                            <a href="https://www.instagram.com/danioliveira.inspira?igsh=MXQ2dGw3ZGU5Ympuag==" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i> Instagram</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="accordion">
                <button class="btn btn-primary accordion-header">
                    <span>Ju Campos</span>
                    <i class="fas fa-chevron-down chevron"></i>
                </button>
                <div class="accordion-content">
                    <div class="content-inner">
                        <img src="images/ju_oliveira.JPG" alt="Ju Campos" class="avatar-small">
                        <p>Foco em flexibilidade e força nas alturas.</p>
                        <div class="sub-links">
                            <a href="https://www.instagram.com/juolicampos?igsh=MWRkOWdjbzVncDg0aA==" target="_blank" rel="noopener noreferrer"><i class="fab fa-instagram"></i> Instagram</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Floating Close Button -->
        <div class="footer-action">
            <button class="close-btn" id="closeAllAccordions" aria-label="Fechar">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const accordions = document.querySelectorAll('.accordion');
        const closeBtn = document.getElementById('closeAllAccordions');
        
        const updateBodyState = () => {
            const anyOpen = Array.from(accordions).some(acc => acc.classList.contains('open'));
            if (anyOpen) {
                document.body.classList.add('accordion-open');
            } else {
                document.body.classList.remove('accordion-open');
            }
        };

        // Accordion Logic
        document.querySelectorAll('.accordion-header').forEach(button => {
            button.addEventListener('click', () => {
                const accordion = button.parentElement;
                const isOpening = !accordion.classList.contains('open');
                
                // Close all others
                accordions.forEach(other => {
                    if (other !== accordion) {
                        other.classList.remove('open');
                    }
                });

                // Toggle current
                accordion.classList.toggle('open');
                updateBodyState();

                // Auto-scroll when opening
                if (isOpening) {
                    setTimeout(() => {
                        accordion.scrollIntoView({ 
                            behavior: 'smooth', 
                            block: 'center' 
                        });
                    }, 200);
                }
            });
        });

        // Close all logic
        closeBtn.addEventListener('click', () => {
            accordions.forEach(acc => acc.classList.remove('open'));
            updateBodyState();
        });
    </script>
</body>
</html>
